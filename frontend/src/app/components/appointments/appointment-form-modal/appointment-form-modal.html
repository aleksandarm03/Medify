<div *ngIf="isOpen" class="modal-overlay" (click)="onOverlayClick()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <div class="modal-header">
      <h2>Novi termin</h2>
      <p>Unesi podatke termina i sačuvaj.</p>
    </div>

    <div *ngIf="error" class="form-error">{{ error }}</div>

    <form novalidate>
      <div class="form-group" *ngIf="isDoctor">
        <label>Pacijent (ID)</label>
        <input
          type="text"
          [value]="appointment.patientId"
          (input)="onPatientChange($any($event).target.value)"
          placeholder="Unesite ID pacijenta"
          required />
      </div>

      <div class="form-group" *ngIf="isPatient">
        <label>Doktor</label>
        <select
          [value]="appointment.patientId"
          (change)="onPatientChange($any($event).target.value)"
          required>
          <option value="">Izaberite doktora</option>
          <option *ngFor="let doctor of doctors" [value]="doctor._id">
            {{ doctor.firstName }} {{ doctor.lastName }} - {{ doctor.specialization }}
          </option>
        </select>
      </div>

      <!-- Za doktore - slobodan unos datuma i vremena -->
      <div class="form-group" *ngIf="isDoctor">
        <label>Datum i vreme</label>
        <input
          type="datetime-local"
          [value]="appointment.appointmentDate"
          [min]="minDate + 'T00:00'"
          (input)="onDateChange($any($event).target.value)"
          required />
      </div>

      <!-- Za pacijente - izbor datuma i dostupnih slotova -->
      <div *ngIf="isPatient">
        <div class="form-group">
          <label>Datum</label>
          <input
            type="date"
            [value]="selectedDate()"
            [min]="minDate"
            [disabled]="!selectedDoctor()"
            (input)="onDateChangePatient($any($event).target.value)"
            required />
          <small *ngIf="!selectedDoctor()" class="form-hint">Prvo izaberite doktora</small>
        </div>

        <!-- Prikaz dostupnih slotova -->
        <div class="form-group" *ngIf="selectedDate() && selectedDoctor()">
          <label>Dostupni termini</label>
          <div *ngIf="loadingSlots()" class="slots-loading">Učitavanje dostupnih termina...</div>
          <div *ngIf="slotsError()" class="form-error">{{ slotsError() }}</div>
          
          <div *ngIf="!loadingSlots() && availableSlots().length > 0" class="time-slots">
            <button
              *ngFor="let slot of availableSlots()"
              type="button"
              class="time-slot-btn"
              [class.selected]="selectedTimeSlot() === slot.value"
              (click)="onTimeSlotSelect(slot.value)">
              {{ slot.label }}
            </button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label>Razlog pregleda</label>
        <textarea
          [value]="appointment.reason"
          (input)="onReasonChange($any($event).target.value)"
          placeholder="Npr. kontrolni pregled, bol u grlu, tumačenje nalaza..."
          required></textarea>
      </div>

      <div class="actions">
        <button type="button" class="btn btn-light" (click)="onOverlayClick()">Otkaži</button>
        <button
          type="button"
          class="btn btn-primary"
          [disabled]="loading || (isPatient && !selectedTimeSlot())"
          (click)="onSubmit()">
          {{ loading ? 'Čuvanje...' : 'Sačuvaj termin' }}
        </button>
      </div>
    </form>
  </div>
</div>
